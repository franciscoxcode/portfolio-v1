<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="../styles.css" />
		<title>Resume | Francisco Casillas</title>
	</head>

	<body>
		<header>
			<nav>
				<a class="color2 homeButton small" href="../index.html">FC</a>
			</nav>
			<ul class="icons">
				<li>
					<a href="https://github.com/franciscoxcode" target="_blank"
						><img src="../Icons/github.png" alt="Github Profile"
					/></a>
				</li>
				<li>
					<a href="https://www.linkedin.com/in/franciscoxcode/" target="_blank"
						><img src="../Icons/linkedin.png" alt="LinkedIn Profile"
					/></a>
				</li>
				<li>
					<a href="https://twitter.com/franciscoxcode" target="_blank"
						><img src="../Icons/twitter.png" alt="Twitter Profile"
					/></a>
				</li>
				<li>
					<a href="mailto:fxcasillas.dev@gmail.com"
						><img src="../Icons/mail.png" alt="E-mail Me"
					/></a>
				</li>
			</ul>
		</header>
		<nav class="submenu">
			<span class="upperCase notTooSmall color1">Resume |</span>
			<a
				class="upperCase underlined notTooSmall color3"
				href="../Pages/projects.html"
				>Projects</a
			>
		</nav>
		<main class="resumePage">
			<section class="resumeIntro">
				<div class="resumeActions">
					<a
						class="resumeActionButton resumeActionPrimary"
						href="../Assets/francisco-casillas-cv.pdf"
						target="_blank"
					>
						Open PDF
					</a>
					<a
						class="resumeActionButton"
						href="../Assets/francisco-casillas-cv.pdf"
						download
					>
						Download PDF
					</a>
				</div>
			</section>

			<section class="resumeViewerSection">
				<object
					class="resumeViewer"
					data="../Assets/francisco-casillas-cv.pdf"
					type="application/pdf"
				>
					<div class="resumeFallback">
						<p class="resumePageText">
							Your browser could not preview the PDF.
						</p>
						<a
							class="resumeActionButton resumeActionPrimary"
							href="../Assets/francisco-casillas-cv.pdf"
							target="_blank"
						>
							Open resume
						</a>
					</div>
				</object>
			</section>
		</main>
	</body>
</html>
